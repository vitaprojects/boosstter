name: Build and Publish Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booster_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename and checksum APK
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/app-debug-latest.apk
          sha256sum build/app/outputs/flutter-apk/app-debug-latest.apk > build/app/outputs/flutter-apk/app-debug-latest.sha256

      - name: Publish latest debug APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-debug-latest
          name: APK Debug Latest
          body: |
            Auto-updated debug APK from main.
            Commit: ${{ github.sha }}
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            booster_app/build/app/outputs/flutter-apk/app-debug-latest.apk
            booster_app/build/app/outputs/flutter-apk/app-debug-latest.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: |
            booster_app/build/app/outputs/flutter-apk/app-debug.apk
            booster_app/build/app/outputs/flutter-apk/app-debug-latest.sha256
