name: Build & Release Debug APK

on:
  push:
    branches:
      - apk-workflow-isolated
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: booster_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: booster_app
        run: flutter build apk --debug --no-shrink

      - name: Generate build stamp and checksum
        id: stamp
        run: |
          STAMP=$(date -u +'%Y-%m-%d_%H-%M-%S')
          APK_SRC=booster_app/build/app/outputs/flutter-apk/app-debug.apk
          APK_NAME="app-debug-${STAMP}.apk"
          LATEST_APK_NAME="app-debug-latest.apk"
          cp "$APK_SRC" "$APK_NAME"
          cp "$APK_SRC" "$LATEST_APK_NAME"
          sha256sum "$APK_NAME" > "${APK_NAME}.sha256"
          sha256sum "$LATEST_APK_NAME" > "${LATEST_APK_NAME}.sha256"
          echo "stamp=${STAMP}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "latest_apk_name=${LATEST_APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=apk-debug-${STAMP}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stamp.outputs.tag }}
          name: "Debug APK ${{ steps.stamp.outputs.stamp }}"
          prerelease: true
          body: |
            Automated debug build from branch `${{ github.ref_name }}` — commit `${{ github.sha }}`.

            **What's in this build**
            - Updated Orders page (role-aware dashboard for customers & providers)
            - Battery Boost flow fixes (EV plug type selection + tow validation)
            - All local workspace changes included

            **Install**
            1. Download the `.apk` file below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the downloaded file to install
          files: |
            ${{ steps.stamp.outputs.apk_name }}
            ${{ steps.stamp.outputs.apk_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update latest APK release (stable URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-debug-latest
          name: "Debug APK Latest"
          prerelease: true
          body: |
            Latest debug APK from branch `${{ github.ref_name }}` — commit `${{ github.sha }}`.

            Permanent download URL:
            https://github.com/${{ github.repository }}/releases/download/apk-debug-latest/app-debug-latest.apk
          overwrite_files: true
          files: |
            ${{ steps.stamp.outputs.latest_apk_name }}
            ${{ steps.stamp.outputs.latest_apk_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
